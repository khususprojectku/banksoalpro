<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BankSoalPro - Sistem Manajemen Bank Soal</title>
  <meta name="description" content="BankSoalPro - Platform CBT & Bank Soal terbaik untuk sekolah. Kelola soal, ujian online, anti-cheat, dan laporan nilai secara otomatis.">
  <!-- Premium Stylesheet -->
  <link rel="stylesheet" href="style.css">

  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- SheetJS (XLSX) CDN for Excel Import/Export -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <!-- Chart.js CDN for Dashboard Statistics -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- MathJax for LaTeX mathematical formula rendering -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
      }
    };
  </script>
  <script type="text/javascript" id="MathJax-script" async
    src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
  </script>
</head>
<body>

  <!-- SPA Target Element -->
  <div id="app">
    <!-- View will be rendered here dynamically by app.js -->
    <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; color: #4a5568;">
      <div style="border: 4px solid #e2e8f0; border-top-color: #4f46e5; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;"></div>
      <p style="margin-top: 16px; font-weight: 600; font-size: 15px;">Memuat BankSoalPro...</p>
    </div>
  </div>

  <!-- Toast Notification Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Global Modal Overlay -->
  <div id="global-modal" class="modal-overlay">
    <div class="modal-content" id="modal-content-container">
      <!-- Modal content is injected here dynamically -->
    </div>
  </div>

  <style>
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>

  <script>
    // ES modules are blocked by Chromium-based browsers when an HTML file is opened
    // directly from disk (file:///). Show the solution instead of leaving the loader
    // spinning forever.
    function showStartupHelp(message) {
      const app = document.getElementById('app');
      if (!app || app.dataset.startupHelpShown) return;
      app.dataset.startupHelpShown = 'true';
      app.innerHTML = `
        <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;font-family:system-ui,sans-serif;background:#f8fafc;color:#1e293b;box-sizing:border-box;">
          <div style="max-width:560px;background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:32px;box-shadow:0 12px 32px rgba(15,23,42,.08);text-align:center;">
            <div style="font-size:38px;margin-bottom:10px;">&#9888;&#65039;</div>
            <h1 style="font-size:22px;margin:0 0 12px;">BankSoalPro perlu dijalankan melalui server lokal</h1>
            <p style="line-height:1.6;color:#475569;margin:0 0 18px;">${message}</p>
            <div style="text-align:left;background:#eef2ff;border-radius:10px;padding:16px;color:#3730a3;line-height:1.65;">
              <strong>Cara membuka aplikasi:</strong><br>
              1. Tutup tab ini.<br>
              2. Klik dua kali <code style="background:#fff;padding:2px 6px;border-radius:4px;">run.bat</code> di folder aplikasi.<br>
              3. Browser akan membuka <code style="background:#fff;padding:2px 6px;border-radius:4px;">http://localhost:8000</code>.
            </div>
          </div>
        </div>`;
    }

    if (window.location.protocol === 'file:') {
      showStartupHelp('File index.html dibuka langsung dari komputer. Demi keamanan, browser tidak dapat menjalankan komponen aplikasi dengan cara ini.');
    }

    window.addEventListener('error', (event) => {
      if (event.target && event.target.id === 'main-app-script') {
        showStartupHelp('Komponen utama aplikasi gagal dimuat. Jalankan aplikasi melalui run.bat lalu buka alamat localhost yang ditampilkan.');
      }
    }, true);
  </script>

  <!-- Main JavaScript App module -->
  <script id="main-app-script" type="module" src="app.js"></script>
</body>
</html>
