<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BankSoalPro - Sistem Manajemen Bank Soal</title>
  
  <!-- Premium Stylesheet -->
  <link rel="stylesheet" href="style.css">
  
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- SheetJS (XLSX) CDN for Excel Import/Export -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  
  <!-- Chart.js CDN for Dashboard Statistics -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <!-- MathJax for LaTeX mathematical formula rendering -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
      }
    };
  </script>
  <script type="text/javascript" id="MathJax-script" async
    src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
  </script>
</head>
<body>

  <!-- SPA Target Element -->
  <div id="app">
    <!-- View will be rendered here dynamically by app.js -->
    <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; color: #4a5568;">
      <div style="border: 4px solid #e2e8f0; border-top-color: #4f46e5; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;"></div>
      <p style="margin-top: 16px; font-weight: 600; font-size: 15px;">Memuat BankSoalPro...</p>
    </div>
  </div>

  <!-- Toast Notification Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Global Modal Overlay -->
  <div id="global-modal" class="modal-overlay">
    <div class="modal-content" id="modal-content-container">
      <!-- Modal content is injected here dynamically -->
    </div>
  </div>

  <style>
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>

  <!-- Main JavaScript App module -->
  <script type="module" src="app.js"></script>
</body>
</html>
